{{ partial "header.html" . }}

<div class="content-wrapper">
{{if not .IsHome }}
  <h1>{{ .Title | markdownify }}</h1>
{{ end }}

<ul class="terms">
  {{ range .Data.Terms }}
  <li>
    <a href="{{ .Page.Permalink }}">{{ .Page.Title }}</a> ({{ .Count }})
  </li>
  {{ end }}
</ul>
</div>
{{ partial "footer.html" . }}
